name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%23ff3b3b&color_dots=%230d0d10,%233b0000,%237a0000,%23b30000,%23ff3b3b
            dist/github-snake-dark.svg?color_snake=%23ff3b3b&color_dots=%230d0d10,%233b0000,%237a0000,%23b30000,%23ff3b3b

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
